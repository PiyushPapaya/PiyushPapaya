<svg width="1000" height="180"
viewBox="0 0 1000 180"
xmlns="http://www.w3.org/2000/svg">


<rect width="1000" height="180" fill="#0d0d0c"/>


<!-- roadmap -->

<line
x1="120"
y1="95"
x2="880"
y2="95"
stroke="#f2ebdd"
stroke-opacity=".35"
stroke-width="2"/>



<g
font-family="JetBrains Mono,monospace"
text-anchor="middle">


<!-- nodes -->

<g fill="#f2ebdd">

<circle cx="150" cy="95" r="6"/>
<circle cx="300" cy="95" r="6"/>
<circle cx="450" cy="95" r="6"/>
<circle cx="600" cy="95" r="6"/>

</g>


<!-- current -->

<circle cx="750" cy="95" r="12"
stroke="#f2ebdd"
stroke-width="2"
fill="none">

<animate
attributeName="r"
values="10;15;10"
dur="2s"
repeatCount="indefinite"/>

</circle>

<circle cx="750" cy="95"
r="5"
fill="#f2ebdd"/>



<!-- future -->

<circle cx="880" cy="95"
r="7"
fill="none"
stroke="#888"
stroke-dasharray="3 3"/>



<g fill="#f2ebdd"
font-family="Inter,Arial">

<text x="150" y="45" font-size="14">
IC Calculator
</text>

<text x="300" y="45" font-size="14">
Flipper Zero
</text>

<text x="450" y="45" font-size="14">
Claude Display
</text>

<text x="600" y="45" font-size="14">
Register Map
</text>

<text x="750" y="45" font-size="14">
Gestura
</text>

<text x="880" y="45" font-size="14">
Silicon
</text>


</g>



<g fill="#888">

<text x="150" y="135">2023</text>
<text x="300" y="135">2025</text>
<text x="450" y="135">2026</text>
<text x="600" y="135">2026</text>
<text x="750" y="135">NOW</text>
<text x="880" y="135">NEXT</text>

</g>


</g>


</svg>
