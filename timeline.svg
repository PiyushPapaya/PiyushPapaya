<svg width="1200" height="180"
viewBox="0 0 1200 180"
xmlns="http://www.w3.org/2000/svg"
role="img"
aria-label="Project timeline">

<rect width="1200" height="180" fill="#0d1117"/>


<!-- roadmap line -->

<line
x1="130"
y1="95"
x2="1070"
y2="95"
stroke="#ffffff"
stroke-opacity="0.18"
stroke-width="2"/>



<!-- progress line -->

<line
x1="130"
y1="95"
x2="880"
y2="95"
stroke="#ffffff"
stroke-opacity="0.35"
stroke-width="2"/>



<!-- completed nodes -->

<g fill="#ffffff">

<circle cx="160" cy="95" r="5"/>
<circle cx="340" cy="95" r="5"/>
<circle cx="520" cy="95" r="5"/>
<circle cx="700" cy="95" r="5"/>

</g>



<!-- current -->

<circle
cx="880"
cy="95"
r="12"
fill="none"
stroke="#ffffff"
stroke-width="2">

<animate
attributeName="r"
values="10;15;10"
dur="2.5s"
repeatCount="indefinite"/>

</circle>


<circle
cx="880"
cy="95"
r="5"
fill="#ffffff"/>




<!-- future -->

<circle
cx="1040"
cy="95"
r="7"
fill="none"
stroke="#8b949e"
stroke-width="2"
stroke-dasharray="3 4"/>




<!-- project names -->

<g
font-family="Inter,Segoe UI,Arial"
font-size="14"
fill="#f0f0f0"
text-anchor="middle">


<text x="160" y="48">
IC Calculator
</text>

<text x="340" y="48">
Flipper Zero
</text>

<text x="520" y="48">
Claude Display
</text>

<text x="700" y="48">
Register Map
</text>

<text x="880" y="48">
Gestura
</text>

<text x="1040" y="48">
Silicon
</text>


</g>




<!-- years -->

<g
font-family="JetBrains Mono,monospace"
font-size="11"
fill="#8b949e"
text-anchor="middle">


<text x="160" y="135">
2023
</text>

<text x="340" y="135">
2025
</text>

<text x="520" y="135">
2026
</text>

<text x="700" y="135">
2026
</text>

<text x="880" y="135">
NOW
</text>

<text x="1040" y="135">
NEXT
</text>


</g>


</svg>
