<svg width="1200" height="260" viewBox="0 0 1200 260"
xmlns="http://www.w3.org/2000/svg"
role="img"
aria-label="Piyush Nagpal — Chip Design, Machine Learning, Embedded Systems">

<defs>
<linearGradient id="fade">
  <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
  <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.7"/>
  <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>
</defs>

<!-- background -->
<rect width="1200" height="260" fill="#0d1117"/>

<!-- subtle chip traces -->
<g stroke="#ffffff" stroke-opacity="0.08" fill="none">
  <path d="M80 65H220V45H300"/>
  <path d="M80 195H220V215H300"/>
  <path d="M1120 65H980V45H900"/>
  <path d="M1120 195H980V215H900"/>
</g>

<!-- center signal -->
<rect
x="-200"
y="130"
width="180"
height="2"
fill="url(#fade)">
<animate
attributeName="x"
from="-200"
to="1200"
dur="7s"
repeatCount="indefinite"/>
</rect>

<!-- name -->
<text
x="600"
y="112"
text-anchor="middle"
font-family="Inter, Segoe UI, Arial, sans-serif"
font-size="68"
font-weight="700"
letter-spacing="-2"
fill="#ffffff">
Piyush Nagpal
</text>

<!-- divider -->
<line
x1="400"
y1="145"
x2="800"
y2="145"
stroke="#ffffff"
stroke-opacity="0.15"
stroke-width="2"/>

<!-- focus -->
<text
x="600"
y="185"
text-anchor="middle"
font-family="JetBrains Mono, Consolas, monospace"
font-size="20"
font-weight="500"
letter-spacing="3.5"
fill="#c9d1d9">
CHIP DESIGN  •  MACHINE LEARNING  •  EMBEDDED SYSTEMS
</text>

<!-- footer -->
<text
x="600"
y="225"
text-anchor="middle"
font-family="Inter, Arial, sans-serif"
font-size="17"
letter-spacing="3"
fill="#8b949e">
ENGINEERING INTELLIGENT HARDWARE
</text>

</svg>
