<svg width="1000" height="260" viewBox="0 0 1000 260"
xmlns="http://www.w3.org/2000/svg"
role="img"
aria-label="Piyush Nagpal — Embedded Systems, Machine Learning, Silicon">

<defs>

<linearGradient id="glow">
<stop stop-color="#f2ebdd" stop-opacity="0"/>
<stop offset="0.5" stop-color="#f2ebdd"/>
<stop offset="1" stop-color="#f2ebdd" stop-opacity="0"/>
</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="3"/>
</filter>

</defs>


<!-- background -->
<rect width="1000" height="260" fill="#0d0d0c"/>


<!-- circuit traces -->
<g stroke="#f2ebdd" opacity="0.15" fill="none">

<path d="M80 70 H230 V40 H310"/>
<path d="M920 70 H770 V40 H690"/>

<path d="M80 190 H230 V220 H310"/>
<path d="M920 190 H770 V220 H690"/>

</g>


<!-- moving signal -->

<rect x="0" y="128" width="180" height="2"
fill="url(#glow)"
opacity="0.7">

<animate
attributeName="x"
from="-200"
to="1000"
dur="5s"
repeatCount="indefinite"/>

</rect>



<!-- name -->

<text
x="500"
y="112"
text-anchor="middle"
font-family="Inter,Segoe UI,Arial"
font-size="64"
font-weight="750"
letter-spacing="-1"
fill="#f2ebdd">

Piyush Nagpal

</text>



<!-- divider -->

<g opacity="0.7">

<line x1="360" y1="150"
x2="470"
y2="150"
stroke="#cfc6b3"/>

<line x1="530" y1="150"
x2="640"
y2="150"
stroke="#cfc6b3"/>


<circle cx="500"
cy="150"
r="4"
fill="#f2ebdd">

<animate
attributeName="r"
values="3;6;3"
dur="2s"
repeatCount="indefinite"/>

</circle>

</g>



<text
x="500"
y="185"
text-anchor="middle"
font-family="JetBrains Mono,monospace"
font-size="15"
letter-spacing="3"
fill="#a89f8d">

EMBEDDED • ML • SILICON

</text>



<!-- bottom status -->

<text
x="500"
y="220"
text-anchor="middle"
font-family="JetBrains Mono,monospace"
font-size="11"
fill="#777">

BUILDING SYSTEMS THAT THINK

</text>


</svg>
