<svg width="1500" height="360" viewBox="0 0 1500 360"
xmlns="http://www.w3.org/2000/svg"
role="img"
aria-label="Piyush Nagpal — Chip Design, Machine Learning, Embedded Systems">

<defs>
<linearGradient id="fade">
  <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
  <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.7"/>
  <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>
</defs>

<!-- background -->
<rect width="1500" height="360" fill="#0d1117"/>

<!-- subtle chip traces -->
<g stroke="#ffffff" stroke-opacity="0.08" fill="none">
  <path d="M100 90H275V60H375"/>
  <path d="M100 270H275V300H375"/>
  <path d="M1400 90H1225V60H1125"/>
  <path d="M1400 270H1225V300H1125"/>
</g>

<!-- center signal -->
<rect
x="-250"
y="180"
width="220"
height="2"
fill="url(#fade)">
<animate
attributeName="x"
from="-250"
to="1500"
dur="7s"
repeatCount="indefinite"/>
</rect>

<!-- name -->
<text
x="750"
y="155"
text-anchor="middle"
font-family="Inter, Segoe UI, Arial, sans-serif"
font-size="92"
font-weight="700"
letter-spacing="-3"
fill="#ffffff">
Piyush Nagpal
</text>

<!-- divider -->
<line
x1="500"
y1="205"
x2="1000"
y2="205"
stroke="#ffffff"
stroke-opacity="0.15"
stroke-width="2"/>

<!-- focus -->
<text
x="750"
y="260"
text-anchor="middle"
font-family="JetBrains Mono, Consolas, monospace"
font-size="24"
font-weight="500"
letter-spacing="5"
fill="#c9d1d9">
CHIP DESIGN  •  MACHINE LEARNING  •  EMBEDDED SYSTEMS
</text>

<!-- footer -->
<text
x="750"
y="310"
text-anchor="middle"
font-family="Inter, Arial, sans-serif"
font-size="20"
letter-spacing="4"
fill="#8b949e">
ENGINEERING INTELLIGENT HARDWARE
</text>

</svg>
