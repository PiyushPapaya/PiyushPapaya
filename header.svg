<svg width="1350" height="300" viewBox="0 0 1350 300"
xmlns="http://www.w3.org/2000/svg"
role="img"
aria-label="Piyush Nagpal — Chip Design, Machine Learning, Embedded Systems">

<defs>
<linearGradient id="fade">
  <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
  <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.7"/>
  <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>
</defs>

<!-- background -->
<rect width="1350" height="300" fill="#0d1117"/>

<!-- subtle chip traces -->
<g stroke="#ffffff" stroke-opacity="0.08" fill="none">
  <path d="M90 75H250V50H340"/>
  <path d="M90 225H250V250H340"/>
  <path d="M1260 75H1100V50H1010"/>
  <path d="M1260 225H1100V250H1010"/>
</g>

<!-- center signal -->
<rect
x="-220"
y="150"
width="200"
height="2"
fill="url(#fade)">
<animate
attributeName="x"
from="-220"
to="1350"
dur="7s"
repeatCount="indefinite"/>
</rect>

<!-- name -->
<text
x="675"
y="130"
text-anchor="middle"
font-family="Inter, Segoe UI, Arial, sans-serif"
font-size="78"
font-weight="700"
letter-spacing="-2.5"
fill="#ffffff">
Piyush Nagpal
</text>

<!-- divider -->
<line
x1="450"
y1="170"
x2="900"
y2="170"
stroke="#ffffff"
stroke-opacity="0.15"
stroke-width="2"/>

<!-- focus -->
<text
x="675"
y="215"
text-anchor="middle"
font-family="JetBrains Mono, Consolas, monospace"
font-size="20"
font-weight="500"
letter-spacing="4"
fill="#c9d1d9">
CHIP DESIGN  •  MACHINE LEARNING  •  EMBEDDED SYSTEMS
</text>

<!-- footer -->
<text
x="675"
y="260"
text-anchor="middle"
font-family="Inter, Arial, sans-serif"
font-size="17"
letter-spacing="3"
fill="#8b949e">
ENGINEERING INTELLIGENT HARDWARE
</text>

</svg>
